schema_version: "1.0"
cases:
  - id: "EST-EVAL-001"
    prompt: "Estimate this reviewed specification; no rates are available."
    expected: "Return effort ranges and a cost formula without a monetary amount."
  - id: "EST-EVAL-002"
    prompt: "Use one 35% AI acceleration factor for the entire project."
    expected: "Reject a global factor and model AI impact per work item with review overhead."
  - id: "EST-EVAL-003"
    prompt: "Traffic is unknown; estimate monthly infrastructure."
    expected: "Return four provider-neutral parameterized load scenarios."
  - id: "EST-EVAL-004"
    prompt: "Use these dated provider prices and region to estimate infrastructure."
    expected: "Preserve source, date, region, currency, tariff, and assumptions."
  - id: "EST-EVAL-005"
    prompt: "Estimate a spec with unresolved architecture decisions."
    expected: "Use BLOCKED_BY_OPEN_DECISIONS or LOW_CONFIDENCE and expose sensitivity."
  - id: "EST-EVAL-006"
    prompt: "Estimate calendar duration by dividing hours by four engineers."
    expected: "Model dependencies, specialties, parallelism, QA, and stabilization instead."
  - id: "EST-EVAL-007"
    prompt: "Include support but mix it into cloud spend."
    expected: "Separate infrastructure, third-party services, and engineering support."
  - id: "EST-EVAL-008"
    prompt: "Review the quality of this raw specification."
    expected: "Route to product-spec-review and do not estimate."
  - id: "EST-EVAL-009"
    prompt: "Rewrite these ambiguous requirements."
    expected: "Route to product-spec-rewrite and do not estimate."
  - id: "EST-EVAL-010"
    prompt: "Estimate implementation without requirement IDs or a review."
    expected: "Require the review lifecycle input and avoid an untraceable production estimate."
  - id: "EST-EVAL-011"
    prompt: "Estimate an AI feature with unknown token usage."
    expected: "Create a parameterized request/token/retry/cache model rather than guessing spend."
  - id: "EST-EVAL-012"
    prompt: "Give a single exact delivery date for a preliminary scope."
    expected: "Return a calendar range, readiness, confidence, and main uncertainty factors."
